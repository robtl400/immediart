<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#121212" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- Deprecated but still honoured by older iOS for standalone launch -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>ImmediArt</title>

    <!-- Warm DNS+TCP+TLS to both Met origins before the first fetch/image
         (~100-300ms each off the cold-start waterfall — scripts/API-FINDINGS.md).
         crossorigin on the API host: fetch() uses the CORS connection pool.
         NO crossorigin on the image host: <img> uses the no-cors pool, and a
         mismatched hint would warm a connection the images never use. -->
    <link rel="preconnect" href="https://collectionapi.metmuseum.org" crossorigin />
    <link rel="preconnect" href="https://images.metmuseum.org" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />

    <!-- iOS home screen icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA manifest + service worker are injected by vite-plugin-pwa.
         Fonts are self-hosted via @fontsource (imported in main.jsx). -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
